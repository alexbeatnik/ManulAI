name: Release VSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to release, for example v0.0.8
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Package VSIX
        run: npm exec -- @vscode/vsce package

      - name: Resolve release metadata
        id: release_meta
        run: |
          VSIX_FILE=$(find . -maxdepth 1 -name 'manulai-local-agent-*.vsix' -print | head -n 1)
          if [ -z "$VSIX_FILE" ]; then
            echo "::error::VSIX file not found"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "vsix_file=$VSIX_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          generate_release_notes: true
          files: ${{ steps.release_meta.outputs.vsix_file }}

      - name: Warn when VS Code Marketplace token is missing
        if: ${{ secrets.VSCE_PAT == '' }}
        run: echo "::warning::VSCE_PAT secret is not configured. Skipping VS Code Marketplace publish."

      - name: Publish to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm exec -- @vscode/vsce publish --packagePath "${{ steps.release_meta.outputs.vsix_file }}" --pat "$VSCE_PAT"

      - name: Warn when Open VSX token is missing
        if: ${{ secrets.OPEN_VSX_TOKEN == '' }}
        run: echo "::warning::OPEN_VSX_TOKEN secret is not configured. Skipping Open VSX publish."

      - name: Publish to Open VSX
        if: ${{ secrets.OPEN_VSX_TOKEN != '' }}
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: npm exec --yes --package ovsx -- ovsx publish "${{ steps.release_meta.outputs.vsix_file }}" -p "$OPEN_VSX_TOKEN"
