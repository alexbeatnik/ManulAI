name: Release VSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to create/release. Leave blank to derive from package.json (v<version>).
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run compile

      - name: Run tests
        run: npm test

      - name: Package VSIX
        run: npm exec -- @vscode/vsce package

      - name: Resolve release metadata
        id: release_meta
        env:
          INPUT_TAG_NAME: ${{ github.event.inputs.tag_name }}
        run: |
          VSIX_FILE=$(find . -maxdepth 1 -name 'manulai-local-agent-*.vsix' -print | head -n 1)
          if [ -z "$VSIX_FILE" ]; then
            echo "::error::VSIX file not found"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "$INPUT_TAG_NAME" ]; then
              TAG_NAME="$INPUT_TAG_NAME"
            else
              PKG_VERSION=$(node -p "require('./package.json').version")
              TAG_NAME="v$PKG_VERSION"
            fi
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists on origin; reusing it."
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG_NAME does not exist; release step will create it."
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "vsix_file=$VSIX_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          generate_release_notes: true
          files: ${{ steps.release_meta.outputs.vsix_file }}

      - name: Detect publish secrets
        id: publish_secrets
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: |
          if [ -n "$VSCE_PAT" ]; then
            echo "has_vsce=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vsce=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$OPEN_VSX_TOKEN" ]; then
            echo "has_ovsx=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_ovsx=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn when VS Code Marketplace token is missing
        if: steps.publish_secrets.outputs.has_vsce != 'true'
        run: echo "::warning::VSCE_PAT secret is not configured. Skipping VS Code Marketplace publish."

      - name: Publish to VS Code Marketplace
        if: steps.publish_secrets.outputs.has_vsce == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm exec -- @vscode/vsce publish --packagePath "${{ steps.release_meta.outputs.vsix_file }}" --pat "$VSCE_PAT"

      - name: Warn when Open VSX token is missing
        if: steps.publish_secrets.outputs.has_ovsx != 'true'
        run: echo "::warning::OPEN_VSX_TOKEN secret is not configured. Skipping Open VSX publish."

      - name: Publish to Open VSX
        if: steps.publish_secrets.outputs.has_ovsx == 'true'
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: npm exec --yes --package ovsx -- ovsx publish "${{ steps.release_meta.outputs.vsix_file }}" -p "$OPEN_VSX_TOKEN"
